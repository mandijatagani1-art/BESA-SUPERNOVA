<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>BESA-SUPERNOVA | CONTROL MONITOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --gold: #f5c242; --neon: #00f2ff; --dark: #0a0a0a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        
        #lockScreen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .lock-card { border: 1px solid var(--gold); padding: 40px; text-align: center; background: var(--dark); }
        input[type="password"] { background: #000; border: 1px solid #333; color: var(--gold); padding: 10px; margin: 20px 0; width: 100%; text-align: center; }

        header { padding: 10px 20px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; font-size: 12px; }
        
        .main-monitor { display: grid; grid-template-columns: 250px 1fr 280px; height: calc(100vh - 40px); }
        .side-panel { border: 1px solid #111; padding: 15px; overflow-y: auto; background: #050505; }
        
        #display-feed { flex-grow: 1; padding: 20px; overflow-y: auto; background: #000; border-right: 1px solid #111; }
        .log { margin-bottom: 5px; font-size: 13px; }
        .dir-line { color: #444; font-size: 10px; margin-bottom: 2px; }

        .control-bar { padding: 15px; background: #080808; border-top: 1px solid var(--gold); display: flex; gap: 10px; }
        #input-cmd { flex-grow: 1; background: #000; border: 1px solid #222; color: var(--neon); padding: 10px; outline: none; }
        
        .status-box { border-left: 2px solid var(--gold); padding: 10px; margin-bottom: 10px; background: #0a0a0a; }
        .label { font-size: 9px; color: #555; }
        .val { font-size: 12px; color: #eee; }
        
        button { background: var(--gold); color: #000; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="lockScreen">
    <div class="lock-card">
        <h2 style="color: var(--gold)">BESA-SUPERNOVA</h2>
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="access()">HYR NË MONITOR</button>
    </div>
</div>

<header>
    <div>STACIONI: BESA-CORE</div>
    <div style="color: var(--neon)" id="ops">30,000 OPS/S</div>
    <div>USER: MANDI JATAGANI</div>
</header>

<div class="main-monitor">
    <div class="side-panel" id="archive">
        <div style="color: var(--gold); margin-bottom: 10px; font-size: 11px;">DOSJET SNBESA (1-200)</div>
    </div>

    <div style="display: flex; flex-direction: column;">
        <div id="display-feed"></div>
        <div class="control-bar">
            <input type="text" id="input-cmd" placeholder="SHKRUAJ KOMANDËN..." onkeypress="if(event.key==='Enter') run()">
            <button onclick="run()">EKZEKUTO</button>
        </div>
    </div>

    <div class="side-panel">
        <div style="color: var(--gold); margin-bottom: 10px; font-size: 11px;">MONITORËT E KONTROLLIT</div>
        <div class="status-box"><div class="label">TEKNIKU</div><div class="val">AKTIV</div></div>
        <div class="status-box"><div class="label">NOTERI</div><div class="val">VULA_READY</div></div>
        <div class="status-box"><div class="label">PRODHIMI</div><div class="val">30K_XHIRO</div></div>
        <div class="status-box" style="border-color: var(--neon);"><div class="label">RRJETI</div><div class="val blink">SINKRON</div></div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://opmderjnjhhqrajijlrh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wbWRlcmpuamhocXJhajlqbHJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyMDUzMzEsImV4cCI6MjAyODc4MTMzMX0.6xvCJmn9RsTJnnhAaHQHJA_eTnsoV1Z4jQ90n2N6V_g';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function access() {
    if(document.getElementById('pass').value === "NuK-ESHT-1-DItE-nUk-EsHt-1-jETe-PER-Ty-u-DesHen-5251569791") {
        document.getElementById('lockScreen').style.display = 'none';
        init();
    }
}

function init() {
    const arc = document.getElementById('archive');
    for(let i=1; i<=200; i++) arc.innerHTML += `<div class="dir-line">DOSJA_SNBESA_${i} [OK]</div>`;
    setInterval(() => {
        document.getElementById('ops').innerText = (29900 + Math.floor(Math.random()*150)).toLocaleString() + " OPS/S";
    }, 500);
    print("SISTEMI", "MONITORI I KONTROLLIT U NDRIÇUA. DREJTORI NË LINJË.");
}

function print(u, m) {
    const f = document.getElementById('display-feed');
    f.innerHTML += `<div class="log"><span style="color:var(--gold)">[${u}]:</span> ${m}</div>`;
    f.scrollTop = f.scrollHeight;
}

async function run() {
    const i = document.getElementById('input-cmd');
    const v = i.value.trim().toUpperCase();
    if(!v) return;
    print("DREJTORI", v);
    i.value = "";
    await _sb.from('system_logs').insert([{ action: 'MONITOR_CMD', target: v }]);
    
    setTimeout(() => {
        if(v === "STATUS") {
            print("MONITORI", "TEKNIKU: OK | NOTERI: OK | PRODHIMI: 30K OPS.");
        } else {
            print("MONITORI", "EKZEKUTUAR NË 200 DREJTORI.");
        }
    }, 500);
}
</script>
</body>
</html>
