<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESA | SUPERNOVA ORBIT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        #canvas-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
        }
        /* Një efekt i lehtë pulsimi në skajet e ekranit */
        #vignette {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,255,65,0.1) 100%);
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="vignette"></div>

    <script>
        // Konfigurimi i Skenës
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Krijimi i Globit (Toka)
        const globeGeo = new THREE.SphereGeometry(20, 64, 64);
        
        // Përdorim texture të thjeshtë ose ngjyrë për efekt
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0x011f0a, // Ngjyrë e errët 'cyber-green'
            wireframe: false,
            shininess: 30
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        // Krijimi i Rrjetit Sentinel (Pikat e dritës rreth globit)
        const pointGeo = new THREE.BufferGeometry();
        const numPoints = 2000;
        const positions = new Float32Array(numPoints * 3);

        for (let i = 0; i < numPoints; i++) {
            const radius = 22; // Pak më i madh se globi
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;

            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = radius * Math.cos(phi);
        }

        pointGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const pointMat = new THREE.PointsMaterial({
            color: 0x00ff41, // E gjelbër Besa
            size: 0.15,
            transparent: true,
            opacity: 0.8
        });
        
        const sentinelNetwork = new THREE.Points(pointGeo, pointMat);
        scene.add(sentinelNetwork);

        // Dritat (Supernova effect)
        const ambientLight = new THREE.AmbientLight(0x111111); // Pak dritë mjedisi
        scene.add(ambientLight);

        // Drita kryesore prapa globit
        const supernovaLight = new THREE.PointLight(0x00f2ff, 3, 100); 
        supernovaLight.position.set(-20, 10, -40); // Prapa dhe anash
        scene.add(supernovaLight);

        // Drita e përparme (për të parë Tokën)
        const frontLight = new THREE.SpotLight(0xffffff, 0.5);
        frontLight.position.set(50, 50, 50);
        scene.add(frontLight);

        camera.position.z = 60;

        // Animacioni
        function animate() {
            requestAnimationFrame(animate);
            
            // Rrotullimi i globit dhe rrjetit
            globe.rotation.y += 0.001;
            sentinelNetwork.rotation.y += 0.0015;
            sentinelNetwork.rotation.x += 0.0005;

            // Pulsing dritës prapa
            const intensity = 3 + Math.sin(Date.now() * 0.001) * 1;
            supernovaLight.intensity = intensity;

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
