<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESA | MANDI LLAZI JATAGANI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --red: #8B0000;
            --bg: #000;
            --terminal: #00ff00;
            --card-bg: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
        }

        /* PORTA E SIGURISË JATAGANI */
        #auth-gate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 10000;
            position: fixed;
            width: 100%;
            border: 4px solid var(--gold);
        }

        .auth-logo {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 8px;
            text-align: center;
        }

        .auth-subtitle {
            color: var(--red);
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .auth-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            border-radius: 0;
            margin-bottom: 20px;
            font-family: monospace;
            outline: none;
        }

        .auth-btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 15px 60px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        /* DASHBOARD KRYESOR */
        #main-ui { display: none; flex-direction: column; height: 100vh; }

        #terminal {
            background: #000;
            border-bottom: 2px solid var(--gold);
            height: 25%;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--terminal);
            overflow-y: auto;
            border-left: 5px solid var(--red);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        @media (max-width: 600px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
        }

        .module {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            padding: 25px 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .module:active { background: #111; border-color: var(--gold); }
        .module span { font-size: 2rem; display: block; margin-bottom: 10px; }
        .module label { font-size: 0.75rem; font-weight: bold; color: var(--gold); letter-spacing: 1px; }

        /* VIEWER */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 20000;
            padding: 40px 20px;
        }

        .close-btn { color: var(--red); font-weight: bold; cursor: pointer; margin-bottom: 30px; display: block; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-logo">JATAGANI</div>
        <div class="auth-subtitle">PROTOKOLLI BESA 2026</div>
        <input type="password" id="masterkey" class="auth-input" placeholder="SHKRUAJ KODIN E MBROJTJES">
        <button class="auth-btn" onclick="login()">HYR NË SISTEM</button>
    </div>

    <div id="main-ui">
        <div id="terminal">
            > SISTEMI JATAGANI AKTIV...<br>
            > PRITET AUTORIZIMI I ARKITEKTIT...<br>
        </div>

        <div class="grid-container">
            <div class="module" onclick="openMod('SHËNDETI', 'Statusi: Mbrojtje maksimale për stafin dhe familjet.')"><span>🏥</span><label>Shëndeti</label></div>
            <div class="module" onclick="openMod('LIGJI', 'Garda Ligjore: Çdo kontratë është e blinduar.')"><span>🛡️</span><label>Ligji</label></div>
            <div class="module" onclick="openMod('PRONAT', 'Portofoli i pasurive të paluajtshme: Gati.')"><span>🏢</span><label>Pronat</label></div>
            <div class="module" onclick="openMod('JUNIOR', 'Zjarri Junior: Edukimi i brezave të rinj.')"><span>🔥</span><label>Junior</label></div>
            <div class="module" onclick="openMod('FINANCA', 'Matrica e Prosperitetit: Bilanci aktiv.')"><span>📊</span><label>Financa</label></div>
            <div class="module" onclick="openMod('ARKIVA', 'Dosjet e SNBESA: Të dhënat janë të siguruara.')"><span>📁</span><label>Arkiva</label></div>
            <div class="module" onclick="openMod('SENTINEL', 'Vëzhgimi 24/7: Sistemi i rrjetit.')"><span>🛰️</span><label>Sentinel</label></div>
            <div class="module" onclick="location.reload()"><span>🔒</span><label>DIL</label></div>
        </div>
    </div>

    <div id="overlay">
        <span class="close-btn" onclick="closeMod()">[ MBYLL MODULIN ]</span>
        <h1 id="mod-title" style="color: var(--gold); font-family: 'Playfair Display', serif; margin-bottom: 20px; font-size: 2.5rem;"></h1>
        <p id="mod-body" style="line-height: 1.8; color: #eee; font-size: 1.1rem; border-left: 2px solid var(--gold); padding-left: 20px;"></p>
    </div>

    <script>
        const MASTER = "NuK-ESHT-1-DItE-nUk-EsHt-1-jETe-PER-Ty-u-DesHen-525156979";

        function login() {
            const val = document.getElementById('masterkey').value;
            if(val === MASTER) {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                log("SISTEMI U ZGJUA.");
                log("MIRËSEVJEN, Z. MANDI LLAZI JATAGANI.");
                log("AUTORITETI: ARKITEKT I SISTEMIT.");
            } else {
                alert("KOD I GABUAR. AKSESI U REFUZUA.");
            }
        }

        function log(msg) {
            const t = document.getElementById('terminal');
            t.innerHTML += `> [${new Date().toLocaleTimeString()}] ${msg}<br>`;
            t.scrollTop = t.scrollHeight;
        }

        function openMod(t, b) {
            document.getElementById('mod-title').innerText = t;
            document.getElementById('mod-body').innerText = b;
            document.getElementById('overlay').style.display = 'block';
            log("MODULI U HAP: " + t);
        }

        function closeMod() {
            document.getElementById('overlay').style.display = 'none';
            log("KTHIM NË DASHBOARD.");
        }
    </script>
</body>
</html>
