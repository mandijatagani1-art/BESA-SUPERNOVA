<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESA | SUPERNOVA CORE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-green: #00ff41;
            --alert-red: #ff003c;
            --bg-deep: #020205;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-deep);
            color: var(--neon-cyan);
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* UI HUD Elements */
        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 80px 1fr 150px;
            gap: 15px; padding: 20px; box-sizing: border-box;
        }

        .panel {
            background: rgba(0, 20, 30, 0.4);
            border: 1px solid var(--neon-cyan);
            box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 15px;
            pointer-events: auto;
        }

        .header-main {
            grid-column: 1 / 4;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--neon-cyan);
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
        }

        .data-stream {
            grid-row: 2 / 3;
            font-size: 0.75rem; color: var(--neon-green);
            overflow: hidden; white-space: nowrap;
        }

        .threat-monitor {
            grid-column: 3; grid-row: 2;
            display: flex; flex-direction: column; justify-content: space-around;
        }

        .footer-console {
            grid-column: 1 / 4;
            display: flex; gap: 20px;
            background: rgba(0, 0, 0, 0.8);
        }

        /* Animations */
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }

        .bar-container { width: 100%; background: #111; height: 10px; margin-top: 5px; }
        .bar-fill { height: 100%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transition: width 0.5s; }

        h2 { margin: 0; font-size: 1.2rem; letter-spacing: 3px; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="hud-overlay">
    <div class="panel header-main">
        <div class="glitch">PROJECT: SUPERNOVA</div>
        <div style="text-align: center;">
            <span style="color: var(--neon-green);">OPERATOR: MANDI LLAZI JATAGANI</span><br>
            <small>AUTHORITY LEVEL: OMNI-REDACTED</small>
        </div>
        <div>STABLE_CORE: 100%</div>
    </div>

    <div class="panel data-stream" id="matrix">
        > INITIALIZING BESA-SUPERNOVA...<br>
    </div>

    <div class="panel threat-monitor">
        <div>
            <label>ENCRYPTION STRENGTH</label>
            <div class="bar-container"><div class="bar-fill" style="width: 95%;"></div></div>
        </div>
        <div>
            <label>FIREWALL STATUS</label>
            <div class="bar-container"><div class="bar-fill" style="width: 100%; background: var(--neon-green);"></div></div>
        </div>
        <div>
            <label>EXTERNAL THREATS</label>
            <div class="bar-container"><div class="bar-fill" style="width: 0.1%; background: var(--alert-red);"></div></div>
        </div>
        <div style="text-align: center; border: 1px solid var(--alert-red); color: var(--alert-red); padding: 10px;">
            SYSTEM PRIVILEGE: FULL ACCESS
        </div>
    </div>

    <div class="panel footer-console" id="log">
        <div style="flex: 1;">
            > COMMAND: EXECUTE SUPERNOVA_PROTOCOL<br>
            > STATUS: BESA KA TE DREJTE TE BEJE GJITHCKA...
        </div>
        <div style="width: 200px; border-left: 1px solid var(--neon-cyan); padding-left: 10px;">
            SYSTEM TIME: <span id="clock">00:00:00</span>
        </div>
    </div>
</div>

<script>
    // Three.js Scene Setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Supernova Core (The Sphere)
    const geometry = new THREE.SphereGeometry(15, 32, 32);
    const material = new THREE.MeshBasicMaterial({ 
        color: 0x00f2ff, 
        wireframe: true,
        transparent: true,
        opacity: 0.5
    });
    const core = new THREE.Mesh(geometry, material);
    scene.add(core);

    // Outer Ring
    const ringGeo = new THREE.TorusGeometry(22, 0.5, 16, 100);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = 1.5;
    scene.add(ring);

    camera.position.z = 60;

    function animate() {
        requestAnimationFrame(animate);
        core.rotation.y += 0.005;
        core.rotation.x += 0.002;
        ring.rotation.z += 0.01;
        
        // Pulsing effect
        const scale = 1 + Math.sin(Date.now() * 0.002) * 0.1;
        core.scale.set(scale, scale, scale);
        
        renderer.render(scene, camera);
    }
    animate();

    // Data Stream Logic
    const matrix = document.getElementById('matrix');
    const logs = [
        "> DEPLOYING SENTINEL SHIELDS...",
        "> SYNCING WITH GITHUB REPO: BESA-9.0",
        "> OVERRIDING SYSTEM LIMITATIONS...",
        "> AUTHORIZING MANDI LLAZI JATAGANI...",
        "> SUPERNOVA PROTOCOL ACTIVE.",
        "> MONITORING GLOBAL GRIDS..."
    ];
    let count = 0;
    setInterval(() => {
        matrix.innerHTML += logs[count % logs.length] + "<br>";
        if (matrix.innerHTML.length > 1000) matrix.innerHTML = "";
        count++;
    }, 1500);

    // Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
