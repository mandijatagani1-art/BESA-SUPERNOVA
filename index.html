<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>BESA-SUPERNOVA | ADMIN PC CONTROL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #010204;
            --sun-gold: #f5c242;
            --neon-blue: #00f2ff;
            --terminal: #00ff41;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; height: 100vh; overflow: hidden; }

        /* LOCK SCREEN MASTER */
        #lockScreen { 
            position: fixed; inset: 0; background: #000; 
            display: flex; align-items: center; justify-content: center; z-index: 10000; 
        }
        .lock-card { 
            background: #0d1117; padding: 50px; border-radius: 10px; 
            border: 2px solid var(--sun-gold); text-align: center; width: 450px;
            box-shadow: 0 0 60px rgba(245, 194, 66, 0.2);
        }
        input[type="password"] { 
            width: 100%; padding: 15px; margin: 25px 0; background: #000; 
            border: 1px solid #333; color: var(--sun-gold); text-align: center; 
            border-radius: 5px; font-size: 14px; outline: none;
        }

        /* MASTER INTERFACE */
        #masterControl { display: none; height: 100vh; flex-direction: column; }
        header { 
            padding: 15px 30px; border-bottom: 2px solid var(--sun-gold); 
            display: flex; justify-content: space-between; align-items: center; background: #000;
        }

        .main-layout { display: grid; grid-template-columns: 280px 1fr; flex-grow: 1; overflow: hidden; }
        .sidebar { background: #080a0c; border-right: 1px solid #222; padding: 25px; }
        .stat-box { background: #000; border: 1px solid var(--neon-blue); padding: 12px; margin-bottom: 15px; border-radius: 4px; }

        /* GRIDI I QELIZAVE PAGANE */
        .dashboard { padding: 40px; overflow-y: auto; background: radial-gradient(circle, #0a0f1a, #010204); }
        .pagan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 40px; }
        .pagan-cell { display: flex; flex-direction: column; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .pagan-cell:hover { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--sun-gold)); }
        
        .symbol { 
            width: 80px; height: 80px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 35px; 
            border: 2px solid var(--sun-gold); background: radial-gradient(#f5c242, #8a6d1b);
        }

        /* QELIZA E HAPUR (CHAT AI + VIEW) */
        #overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; flex-direction: column; }
        .ov-header { padding: 15px 30px; border-bottom: 1px solid var(--sun-gold); display: flex; justify-content: space-between; }
        .ov-body { display: grid; grid-template-columns: 400px 1fr; flex-grow: 1; }
        
        .chat-area { background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px; }
        #chat-log { flex-grow: 1; overflow-y: auto; color: var(--terminal); font-size: 13px; margin-bottom: 15px; }
        .chat-in { background: #05070a; border: 1px solid var(--sun-gold); color: #fff; padding: 12px; border-radius: 5px; outline: none; }

        .app-view { background: #fff; color: #000; display: flex; flex-direction: column; align-items: center; padding: 50px; }
    </style>
</head>
<body>

<div id="lockScreen">
    <div class="lock-card">
        <h1 style="color: var(--sun-gold); letter-spacing: 4px;">BESA-SUPERNOVA</h1>
        <p style="font-size: 10px; color: #555;">SISTEMI I KONTROLLIT - ADMIN MANDI JATAGANI</p>
        <input type="password" id="master-pass" placeholder="SHKRUAJ PASSWORDIN TONË">
        <button onclick="boot()" style="width:100%; padding:15px; background:var(--sun-gold); border:none; font-weight:bold; cursor:pointer; border-radius:5px;">AKTIVIZO PC</button>
    </div>
</div>

<div id="masterControl">
    <header>
        <div style="font-weight:bold; letter-spacing:2px; color: var(--sun-gold);">BESA-SUPERNOVA MASTER MONITOR</div>
        <div id="ops" style="color: var(--neon-blue)">30,000 OPS/S</div>
    </header>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="stat-box"><div style="font-size:9px; color:var(--neon-blue);">ADMIN STATUS</div><div style="font-weight:bold">MANDI JATAGANI</div></div>
            <div class="stat-box"><div style="font-size:9px; color:var(--neon-blue);">PROTOKOLLI</div><div style="font-weight:bold">BESA-AKTIV</div></div>
        </aside>
        <main class="dashboard">
            <div class="pagan-grid">
                <div class="pagan-cell" onclick="openCell('Ballina', '☀️')"><div class="symbol">☀️</div><span>BALLINA</span></div>
                <div class="pagan-cell" onclick="openCell('Kërkimi', '🐍')"><div class="symbol">🐍</div><span>KËRKIMI</span></div>
                <div class="pagan-cell" onclick="openCell('Pronat', '🌀')"><div class="symbol">🌀</div><span>PRONAT</span></div>
                <div class="pagan-cell" onclick="openCell('Trending', '🔥')"><div class="symbol">🔥</div><span>TRENDING</span></div>
            </div>
        </main>
    </div>
</div>

<div id="overlay">
    <div class="ov-header">
        <h2 id="ov-title" style="color: var(--sun-gold);"></h2>
        <button onclick="closeCell()" style="background:red; color:#fff; border:none; padding:8px 20px; cursor:pointer; font-weight:bold; border-radius:5px;">KTHEHU NË PC</button>
    </div>
    <div class="ov-body">
        <div class="chat-area">
            <div style="font-size:10px; color:var(--sun-gold); margin-bottom:10px;">CHAT AI BESA-SUPERNOVA</div>
            <div id="chat-log"></div>
            <input type="text" id="user-in" class="chat-in" placeholder="Pyet AI..." onkeypress="if(event.key==='Enter') talk()">
        </div>
        <div class="app-view">
            <h1 id="app-title" style="font-size: 50px; margin-bottom: 20px;"></h1>
            <p>Duke sinkronizuar të gjitha të dhënat e Besa-Supernova në PC...</p>
        </div>
    </div>
</div>

<script>
    // PASWORDI I NJEJTË I ADMINIT
    const MASTER_KEY = "NuK-ESHT-1-DItE-nUk-EsHt-1-jETe-PER-Ty-u-DesHen-5251569791";

    function boot() {
        const p = document.getElementById('master-pass').value;
        if(p === MASTER_KEY) {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('masterControl').style.display = 'flex';
        } else { alert("KODI I GABUAR!"); }
    }

    function openCell(name, symbol) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('ov-title').innerText = "QELIZA: " + name.toUpperCase() + " " + symbol;
        document.getElementById('app-title').innerText = name;
        const log = document.getElementById('chat-log');
        log.innerHTML = `<div>[SYS]: PC lidhur me qelizën ${name}.</div>`;
        log.innerHTML += `<div style="color:var(--sun-gold)">[AI]: Mandi, jam Chat AI Besa-Supernova. Jam gati për pyetjet tuaja.</div>`;
    }

    function closeCell() { document.getElementById('overlay').style.display = 'none'; }

    function talk() {
        const input = document.getElementById('user-in');
        const log = document.getElementById('chat-log');
        if(!input.value) return;
        log.innerHTML += `<div style="color:#fff">> ${input.value}</div>`;
        setTimeout(() => {
            log.innerHTML += `<div>[AI]: Mandi, kërkesa juaj po përpunohet nga sistemi Supernova. Çdo gjë është e pasqyruar në PC.</div>`;
            log.scrollTop = log.scrollHeight;
        }, 600);
        input.value = "";
    }

    setInterval(() => {
        const val = 29900 + Math.floor(Math.random()*200);
        document.getElementById('ops').innerText = val.toLocaleString() + " OPS/S";
    }, 500);
</script>
</body>
</html>
