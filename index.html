<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>BESA-SUPERNOVA | FULL MASTER MONITOR</title>
    <style>
        :root {
            --bg: #010204;
            --sun-gold: #f5c242;
            --neon-blue: #00f2ff;
            --terminal: #00ff41;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* LOCK SCREEN */
        #lockScreen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .lock-card { background: #0d1117; padding: 40px; border-radius: 10px; border: 2px solid var(--sun-gold); text-align: center; width: 400px; }
        input[type="password"] { width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid #333; color: var(--sun-gold); text-align: center; outline: none; }

        /* HEADER */
        header { padding: 10px 30px; border-bottom: 2px solid var(--sun-gold); display: flex; justify-content: space-between; align-items: center; background: #000; }

        /* MAIN MONITOR LAYOUT */
        #masterControl { display: none; flex-grow: 1; overflow: hidden; }
        .layout { display: grid; grid-template-columns: 280px 1fr; height: 100%; }
        
        .sidebar { background: #080a0c; border-right: 1px solid #222; padding: 20px; overflow-y: auto; }
        .stat-card { background: #000; border: 1px solid var(--neon-blue); padding: 10px; margin-bottom: 10px; font-size: 11px; }

        .content { padding: 20px 40px; overflow-y: auto; background: radial-gradient(circle, #0a111a, #010204); }
        h3 { color: var(--sun-gold); font-size: 11px; letter-spacing: 2px; margin: 25px 0 15px 0; border-left: 3px solid var(--sun-gold); padding-left: 10px; text-transform: uppercase; }

        /* GRIDI I PLOTË ME 45 IKONA */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; padding: 10px; border-radius: 8px; }
        .cell:hover { background: rgba(245, 194, 66, 0.1); transform: translateY(-3px); }
        
        .icon-circle { 
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 25px; border: 1px solid var(--sun-gold); background: radial-gradient(#f5c242, #8a6d1b);
            box-shadow: 0 0 10px rgba(245, 194, 66, 0.1);
        }
        .blue-icon { background: radial-gradient(#1b4d8e, #0a1b33); border-color: var(--neon-blue); }
        .label { font-size: 8px; font-weight: bold; text-align: center; color: #aaa; text-transform: uppercase; }

        /* AI TERMINAL OVERLAY */
        #overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; flex-direction: column; }
        .ov-header { padding: 10px 30px; border-bottom: 1px solid var(--sun-gold); display: flex; justify-content: space-between; align-items: center; background: #000; }
        .ov-body { display: grid; grid-template-columns: 450px 1fr; flex-grow: 1; overflow: hidden; }
        
        .terminal { background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px; }
        #chat-log { flex-grow: 1; overflow-y: auto; color: var(--terminal); font-size: 13px; padding-bottom: 20px; }
        .chat-input { background: #080a0c; border: 1px solid var(--sun-gold); color: #fff; padding: 15px; border-radius: 5px; outline: none; }
        
        .ai-msg { color: var(--terminal); margin-top: 10px; padding-left: 10px; border-left: 2px solid var(--sun-gold); }
        .user-msg { color: #fff; margin-top: 10px; font-weight: bold; }
        .preview-pane { background: #fff; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="lockScreen">
    <div class="lock-card">
        <h1 style="color: var(--sun-gold)">BESA-SUPERNOVA</h1>
        <input type="password" id="pass" placeholder="PASSWORDIN SIÇ E KISHIM">
        <button onclick="login()" style="width:100%; padding:12px; background:var(--sun-gold); border:none; font-weight:bold; cursor:pointer;">AKTIVIZO MONITORIN MASTER</button>
    </div>
</div>

<div id="masterControl">
    <header>
        <div style="font-weight:bold; letter-spacing:2px; color:var(--sun-gold);">MASTER CONTROL PANEL | BESA-SUPERNOVA</div>
        <div id="ops" style="color:var(--neon-blue)">29,987 OPS/S</div>
    </header>
    <div class="layout">
        <aside class="sidebar" id="sidebar-stats">
            <div class="stat-card">SISTEMI: BESA-SUPERNOVA ACTIVE</div>
            <div class="stat-card">USER: MANDI JATAGANI</div>
            <div class="stat-card">DREJTORITË: 33 ONLINE</div>
            <div class="stat-card">QELIZAT: 12 ONLINE</div>
        </aside>
        <main class="content">
            <h3>| 12 Module Publike (App Besa)</h3>
            <div class="grid" id="public-grid"></div>

            <h3>| 33 Drejtoritë e Punës (Besa-Supernova)</h3>
            <div class="grid" id="private-grid"></div>
        </main>
    </div>
</div>

<div id="overlay">
    <div class="ov-header">
        <h2 id="ov-title" style="color: var(--sun-gold); font-size: 14px;"></h2>
        <button onclick="closeMod()" style="background:red; color:#fff; border:none; padding:5px 15px; cursor:pointer; font-weight:bold;">MBYLL</button>
    </div>
    <div class="ov-body">
        <div class="terminal">
            <div id="chat-log"></div>
            <input type="text" id="chat-in" class="chat-input" placeholder="Pyet Besa-AI (Llogaritje, Status, Komanda)..." onkeypress="if(event.key==='Enter') processAI()">
        </div>
        <div class="preview-pane">
            <h1 id="page-h1" style="font-size: 40px; color: #ccc;"></h1>
            <p>Duke sinkronizuar të dhënat në PC...</p>
        </div>
    </div>
</div>

<script>
    const KEY = "NuK-ESHT-1-DItE-nUk-EsHt-1-jETe-PER-Ty-u-DesHen-5251569791";

    const publicMods = [
        ['Ballina', '☀️'], ['Kërkimi', '🔍'], ['Pronat', '🏢'], ['Trending', '🔥'],
        ['Agjentët', '👔'], ['Harta', '📍'], ['Statistikat', '📊'], ['Kalkulatori', '🧮'],
        ['Mesazhet', '📩'], ['Kategoritë', '📁'], ['Pagesat', '💳'], ['Rreth Nesh', 'ℹ️']
    ];

    const privateDirs = [
        'Protokolli','Noteri','Tekniku','Arkiva','Xhiro 30K','Supabase','PDF Export','Rrjeti','Siguria','Logjika','Serveri','Buxheti','Drejtorët','Agjencia','Kadastra','Analitika','Besa AI','Supernova Core','Cloud Setup','API Bridge','Auth Master','Database','Sentinel Grid','Radar','Dashboard','User Control','Risk Tracker','Global Node','Local Storage','History','Backup','Live Sync','Terminal'
    ];

    function login() {
        if(document.getElementById('pass').value === KEY) {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('masterControl').style.display = 'block';
            initGrids();
        } else { alert("KODI I GABUAR!"); }
    }

    function initGrids() {
        const pubGrid = document.getElementById('public-grid');
        const priGrid = document.getElementById('private-grid');

        publicMods.forEach(m => {
            pubGrid.innerHTML += `<div class="cell" onclick="openMod('${m[0]}', '${m[1]}')"><div class="icon-circle">${m[1]}</div><div class="label">${m[0]}</div></div>`;
        });

        privateDirs.forEach(d => {
            priGrid.innerHTML += `<div class="cell" onclick="openMod('${d}', '🛡️')"><div class="icon-circle blue-icon">🛡️</div><div class="label">${d}</div></div>`;
        });
    }

    function openMod(name, icon) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('ov-title').innerText = "QELIZA: " + name.toUpperCase();
        document.getElementById('page-h1').innerText = name;
        const log = document.getElementById('chat-log');
        log.innerHTML = `<div class="ai-msg">[BESA-AI]: Mandi, jam Chat AI Besa-Supernova. Jam lidhur me drejtorinë ${name}. Pres komandat tuaja ose llogaritjet.</div>`;
    }

    function closeMod() { document.getElementById('overlay').style.display = 'none'; }

    function processAI() {
        const input = document.getElementById('chat-in');
        const log = document.getElementById('chat-log');
        const query = input.value.trim();
        if(!query) return;

        log.innerHTML += `<div class="user-msg">> ${query}</div>`;
        
        setTimeout(() => {
            let response = "";
            try {
                if (/[0-9+\-*/]/.test(query)) {
                    response = "Llogaritja doli: " + eval(query.replace(/[^-()\d/*+.]/g, ''));
                } else if (query.toLowerCase().includes("kush je")) {
                    response = "Unë jam Besa-AI, inteligjenca e sistemit Supernova në PC-në e Mandi Jataganit.";
                } else {
                    response = "Urdhri u pranua. Duke përpunuar të dhënat në të 33 drejtoritë.";
                }
            } catch (e) { response = "Format i panjohur. Besa-AI kërkon komanda të sakta."; }

            log.innerHTML += `<div class="ai-msg">[BESA-AI]: ${response}</div>`;
            log.scrollTop = log.scrollHeight;
        }, 500);
        input.value = "";
    }

    setInterval(() => {
        document.getElementById('ops').innerText = (29950 + Math.floor(Math.random()*100)).toLocaleString() + " OPS/S";
    }, 800);
</script>
</body>
</html>
