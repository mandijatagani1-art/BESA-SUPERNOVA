<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESA-9.0 | AUTHENTICATION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary-glow: #00ff41;
            --bg-color: #050505;
            --panel-bg: rgba(0, 20, 0, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--primary-glow);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay UI */
        .interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.8) 100%);
        }

        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--primary-glow);
            padding: 10px;
            background: var(--panel-bg);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .main-display {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        .auth-box {
            background: var(--panel-bg);
            border: 2px solid var(--primary-glow);
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
            backdrop-filter: blur(10px);
        }

        input {
            background: black;
            border: 1px solid var(--primary-glow);
            color: var(--primary-glow);
            padding: 10px;
            margin-top: 10px;
            outline: none;
            text-align: center;
            width: 80%;
        }

        .footer-logs {
            height: 120px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--primary-glow);
            padding: 15px;
            font-size: 0.85rem;
            overflow-y: hidden;
        }

        .scanline {
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            top: 0;
            z-index: 20;
            pointer-events: none;
            animation: scan 6s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="scanline"></div>

    <div class="interface">
        <div class="header">
            <div>SYSTEM: BESA-9.0 / CORE ALIGNMENT</div>
            <div class="blink">STATUS: SECURE_SCAN</div>
            <div>AUTHORITY: MANDI LLAZI JATAGANI</div>
        </div>

        <div class="main-display">
            <div class="auth-box" id="auth-panel">
                <h2 style="margin-top:0;">PROTOKOLLI JATAGANI</h2>
                <p>SHKRUAJ KODIN E AUTORIZIMIT</p>
                <input type="password" id="passInput" placeholder="********">
                <p id="msg" style="margin-top:15px; font-size: 12px;"></p>
            </div>
        </div>

        <div class="footer-logs" id="terminal">
            > [INFO] Inicializimi i Grid-it Sentinel u krye.<br>
            > [WARN] Kërkohet autorizim për akses të plotë.<br>
            > [LOG] Duke monitoruar portën 8080...<br>
        </div>
    </div>

    <script>
        // 3D Background with Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(200, 40, 0x00ff41, 0x002200);
        scene.add(grid);
        camera.position.z = 50;
        camera.position.y = 20;
        camera.rotation.x = -0.4;

        function animate() {
            requestAnimationFrame(animate);
            grid.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        // Terminal Log Interaction
        const terminal = document.getElementById('terminal');
        const passInput = document.getElementById('passInput');
        const msg = document.getElementById('msg');

        passInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const val = passInput.value;
                terminal.innerHTML += `> Duke testuar kodin: ${val.replace(/./g, '*')}...<br>`;
                
                // Këtu mund të vendosësh kodin tënd specifik
                if(val === "BESA2026") { 
                    msg.innerHTML = "AKSESI U LEJUA. MIRËSEVJEN MANDI.";
                    msg.style.color = "lime";
                    terminal.innerHTML += "> [SUCCESS] Autorizimi u pranua. Mirësevjen Kryetar.<br>";
                } else {
                    msg.innerHTML = "KOD I GABUAR. TENTATIVA U REGJISTRUA.";
                    msg.style.color = "red";
                    terminal.innerHTML += "> [ERROR] Tentativë e paautorizuar në sistem.<br>";
                }
                passInput.value = "";
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
