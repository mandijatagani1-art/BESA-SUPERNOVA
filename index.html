<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESA | Portali i Arkitektit</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --glass: rgba(255, 255, 255, 0.8);
            --accent: #6c8ea4; /* Ngjyrë qetësuese blu-hiri */
            --text: #2d3436;
            --gold: #d4af37;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- HYRJA (WELCOME) --- */
        #gate {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        .welcome-card {
            text-align: center;
            animation: fadeIn 2s ease;
        }

        .welcome-card h1 {
            font-weight: 300;
            letter-spacing: 15px;
            color: var(--gold);
            margin-bottom: 30px;
        }

        .input-zen {
            border: none;
            border-bottom: 1px solid #ddd;
            padding: 10px;
            width: 300px;
            text-align: center;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        .input-zen:focus { border-bottom: 1px solid var(--accent); }

        /* --- DASHBOARD-I ME IKONA --- */
        #dashboard {
            display: none;
            width: 90%;
            max-width: 1000px;
            text-align: center;
            animation: slideUp 1s ease;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .nav-item {
            background: var(--glass);
            padding: 40px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: var(--text);
        }

        .nav-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .nav-item h3 {
            margin: 0;
            font-weight: 400;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* --- ANIMACIONET --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .footer-note {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="gate">
        <div class="welcome-card">
            <h1>BESA</h1>
            <p style="opacity: 0.6; font-weight: 300;">Mirëseerdhe në hapësirën tënde, Arkitekt.</p>
            <input type="password" id="p" class="input-zen" placeholder="Kodi i qetësisë...">
            <br><br>
            <button onclick="enter()" style="background: none; border: 1px solid #ddd; padding: 10px 30px; cursor: pointer; color: #888;">Hyr</button>
        </div>
    </div>

    <div id="dashboard">
        <h2 style="font-weight: 300; letter-spacing: 5px; color: var(--accent);">KU DËSHIRONI TË SHKONI?</h2>
        
        <div class="nav-grid">
            <a href="#" class="nav-item">
                <span class="icon">📂</span>
                <h3>PROJEKTET</h3>
            </a>

            <a href="#" class="nav-item">
                <span class="icon">🌐</span>
                <h3>RRJETI</h3>
            </a>

            <a href="#" class="nav-item">
                <span class="icon">📊</span>
                <h3>RAPORTET</h3>
            </a>

            <a href="#" class="nav-item">
                <span class="icon">🤝</span>
                <h3>VAZHDIMËSIA</h3>
            </a>
        </div>

        <div class="footer-note">MANDI JATAGANI | 100 VITE PARA</div>
    </div>

    <script>
        const K = "NuK-ESHT-1-DItE-nUk-EsHt-1-jETe-PER-Ty-u-DesHen-5251569791";

        function enter() {
            const input = document.getElementById('p').value;
            if(input === K) {
                document.getElementById('gate').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('gate').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                }, 1000);
            } else {
                document.getElementById('p').value = "";
            }
        }

        // Lejo Enter
        document.getElementById('p').addEventListener('keypress', (e) => { if(e.key === 'Enter') enter(); });
    </script>
</body>
</html>
