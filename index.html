<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>BESA-SUPERNOVA | PC MASTER COMMAND</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #020406;
            --sun-gold: #f5c242;
            --pagan-blue: #1b4d8e;
            --neon-blue: #00f2ff;
            --terminal-green: #00ff41;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Consolas', 'Courier New', monospace; 
            height: 100vh; overflow: hidden; 
        }

        /* LOCK SCREEN ME FUQI DIELLORE */
        #lockScreen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .lock-card { 
            background: #0d1117; padding: 50px; border-radius: 10px; 
            border: 2px solid var(--sun-gold); text-align: center; width: 450px;
            box-shadow: 0 0 70px rgba(245, 194, 66, 0.2);
        }

        /* MASTER MONITOR STRUCTURE */
        #masterControl { display: none; height: 100vh; flex-direction: column; }
        
        header { 
            padding: 10px 30px; border-bottom: 2px solid var(--sun-gold); 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9);
        }

        .main-frame { display: grid; grid-template-columns: 300px 1fr; flex-grow: 1; overflow: hidden; }

        /* SIDEBAR: MONITORI I QELIZAVE */
        .sidebar { background: #080a0c; border-right: 1px solid #222; padding: 20px; }
        .stat-card { background: #000; border: 1px solid var(--neon-blue); padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .stat-label { font-size: 10px; color: var(--neon-blue); }

        /* PAGAN GRID - IKONAT E PUBLIKUT */
        .dashboard { padding: 30px; overflow-y: auto; background: radial-gradient(circle, #0a0f1a, #020406); }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 30px; }
        
        .pagan-icon { 
            display: flex; flex-direction: column; align-items: center; gap: 10px; 
            cursor: pointer; transition: 0.3s; padding: 15px; border-radius: 10px;
        }
        .pagan-icon:hover { background: rgba(245, 194, 66, 0.1); transform: translateY(-5px); }
        
        .symbol { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 1px solid var(--sun-gold); }
        .gold { background: radial-gradient(#f5c242, #8a6d1b); }
        .blue { background: radial-gradient(#1b4d8e, #0a1b33); }

        /* FAQJA E BRENDSHME DHE CHAT AI */
        #moduleView { 
            display: none; position: fixed; inset: 0; background: var(--bg); 
            z-index: 5000; flex-direction: column; 
        }
        .module-header { padding: 15px 30px; border-bottom: 1px solid var(--sun-gold); display: flex; justify-content: space-between; }
        
        .module-body { display: grid; grid-template-columns: 400px 1fr; flex-grow: 1; }
        
        /* CHAT AI BESA-SUPERNOVA TERMINAL */
        .ai-terminal { background: #000; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; }
        .terminal-output { flex-grow: 1; overflow-y: auto; color: var(--terminal-green); font-size: 13px; margin-bottom: 20px; }
        .terminal-input { background: #05070a; border: 1px solid var(--sun-gold); color: #fff; padding: 12px; border-radius: 5px; outline: none; }

        /* PAMJA E FAQES LIVE */
        .live-app-frame { background: #fff; color: #000; display: flex; flex-direction: column; }

        button.btn-back { background: var(--sun-gold); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="lockScreen">
    <div class="lock-card">
        <h1 style="color: var(--sun-gold); letter-spacing: 5px;">BESA-SUPERNOVA</h1>
        <p style="font-size: 10px; color: #555; margin-bottom: 20px;">PC MASTER INTERFACE - RESTRICTED</p>
        <input type="password" id="pass" placeholder="PASSWORDIN SIÇ E KISHIM">
        <button onclick="boot()" style="width:100%; padding:15px; background:var(--sun-gold); border:none; font-weight:bold; cursor:pointer;">EKZEKUTO</button>
    </div>
</div>

<div id="masterControl">
    <header>
        <div style="font-weight:bold; letter-spacing:2px;">SUPERNOVA MASTER MONITOR</div>
        <div id="ops" style="color: var(--neon-blue)">30,000 OPS/S</div>
    </header>
    <div class="main-frame">
        <aside class="sidebar">
            <div class="stat-card"><div class="stat-label">PROTOKOLLI</div><div style="font-weight:bold">BESA-SUPERNOVA ACTIVE</div></div>
            <div class="stat-card"><div class="stat-label">DREJTORITË</div><div style="font-weight:bold">200 NYJE ONLINE</div></div>
            <div class="stat-card" style="border-color: var(--sun-gold)"><div class="stat-label">USER</div><div style="font-weight:bold">MANDI JATAGANI</div></div>
        </aside>
        <main class="dashboard">
            <div class="icon-grid">
                <div class="pagan-icon" onclick="openModule('Ballina', '☀️', 'gold')">
                    <div class="symbol gold">☀️</div><span style="font-size:10px;">BALLINA</span>
                </div>
                <div class="pagan-icon" onclick="openModule('Kërkimi', '🐍', 'blue')">
                    <div class="symbol blue">🐍</div><span style="font-size:10px;">KËRKIMI</span>
                </div>
                <div class="pagan-icon" onclick="openModule('Pronat', '🌀', 'gold')">
                    <div class="symbol gold">🌀</div><span style="font-size:10px;">PRONAT</span>
                </div>
                <div class="pagan-icon" onclick="openModule('Trending', '🔥', 'blue')">
                    <div class="symbol blue">🔥</div><span style="font-size:10px;">TRENDING</span>
                </div>
            </div>
        </main>
    </div>
</div>

<div id="moduleView">
    <div class="module-header">
        <h2 id="mod-title" style="color: var(--sun-gold); font-size: 16px;"></h2>
        <button class="btn-back" onclick="closeModule()">KTHEHU NË MONITOR</button>
    </div>
    <div class="module-body">
        <div class="ai-terminal">
            <div style="font-size:10px; color:var(--sun-gold); margin-bottom:15px;">TERMINALI AI BESA-SUPERNOVA</div>
            <div id="terminal-out" class="terminal-output"></div>
            <input type="text" id="terminal-in" class="terminal-input" placeholder="Shkruaj pyetjen..." onkeypress="if(event.key==='Enter') sendCommand()">
        </div>
        <div class="live-app-frame">
            <div id="live-content" style="padding: 50px; text-align: center;">
                <h1 id="page-name" style="font-size: 40px; margin-bottom: 20px;"></h1>
                <p>Duke sinkronizuar qelizën me PC-në e Mandit...</p>
                <div style="margin-top: 30px; height: 300px; border: 1px solid #eee; background: #fafafa;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const P = "NuK-ESHT-1-DItE-nUk-EsHt-1-jETe-PER-Ty-u-DesHen-5251569791";

    function boot() {
        if(document.getElementById('pass').value === P) {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('masterControl').style.display = 'flex';
        } else { alert("KODI I GABUAR!"); }
    }

    function openModule(name, symbol, color) {
        document.getElementById('moduleView').style.display = 'flex';
        document.getElementById('mod-title').innerText = "QELIZA: " + name.toUpperCase() + " " + symbol;
        document.getElementById('page-name').innerText = name;
        
        const out = document.getElementById('terminal-out');
        out.innerHTML = `<div>[SYS]: Lidhja me PC u krye.</div>`;
        out.innerHTML += `<div>[AI]: Mandi, jam Chat AI Besa-Supernova. Çfarë kërkoni të dini për ${name}?</div>`;
    }

    function closeModule() {
        document.getElementById('moduleView').style.display = 'none';
    }

    function sendCommand() {
        const input = document.getElementById('terminal-in');
        const out = document.getElementById('terminal-out');
        if(!input.value) return;

        out.innerHTML += `<div style="color:#fff">> ${input.value}</div>`;
        setTimeout(() => {
            out.innerHTML += `<div>[AI]: Mandi, po e pasqyroj në PC të gjithë bazën e të dhënave për këtë kërkesë. Besa-Supernova është gati.</div>`;
            out.scrollTop = out.scrollHeight;
        }, 600);
        input.value = "";
    }

    setInterval(() => {
        const val = 29900 + Math.floor(Math.random()*200);
        document.getElementById('ops').innerText = val.toLocaleString() + " OPS/S";
    }, 500);
</script>
</body>
</html>
