<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>SNBESA v3.1 - AUTORITETI MANDI JATAGANI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --cyan: #00f2ff; --gold: #d4af37; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; margin: 0; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        .ui { position: relative; z-index: 10; padding: 30px; display: grid; grid-template-columns: 1fr 380px; height: 100vh; gap: 20px; }
        .list { background: rgba(0, 10, 20, 0.6); padding: 20px; border: 1px solid rgba(0, 242, 255, 0.2); overflow-y: auto; }
        .panel { background: rgba(0, 20, 30, 0.9); border-left: 3px solid var(--gold); padding: 25px; backdrop-filter: blur(15px); }
        .card { border-left: 4px solid var(--cyan); padding: 15px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .card:hover { background: rgba(0, 242, 255, 0.1); }
        .btn { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid var(--cyan); color: white; text-align: center; font-size: 1.2rem; }
        .status-on { color: #00ff41; font-weight: bold; text-shadow: 0 0 10px #00ff41; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="ui">
        <div class="list">
            <h1 style="color: var(--cyan); border-bottom: 1px solid var(--cyan); padding-bottom: 10px;">PRONAT E NGARKUARA</h1>
            <div id="property-container">
                <p>Sistemi në pritje të autorizimit...</p>
            </div>
        </div>
        <div class="panel">
            <h2 style="color: var(--gold);">KONTROLLI BESA</h2>
            <div id="auth-box">
                <p>Shkruaj kodin e sigurisë për t'u lidhur me Supabase:</p>
                <input type="number" id="secure-code" placeholder="KODI (13)">
                <button class="btn" onclick="startBesa()">AKTIVIZO PROTOKOLLIN</button>
            </div>
            <div id="status-display" style="margin-top: 20px; font-family: monospace;"></div>
        </div>
    </div>

    <script>
        // DHËNAT E MANDI JATAGANIT - TË NDREQURA
        const SB_URL = "https://rpuqfakiocdqwkxyerrz.supabase.co";
        const SB_KEY = "sb_publishable_7NuvtUzj7G61Q6nETWFQTg_Nolyf1mRzW937G6qY-FpYJ3M8Y_S_T-9g"; 

        async function startBesa() {
            const code = document.getElementById('secure-code').value;
            if(code !== "13") { alert("KOD I GABUAR!"); return; }

            try {
                const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
                // Marrja e të dhënave nga tabela properties
                const { data, error } = await supabaseClient.from('properties').select('*');
                
                if (error) throw error;

                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('status-display').innerHTML = "<p class='status-on'>[ONLINE] MIRËSEVJEN MANDI JATAGANI</p>";

                if (data.length === 0) {
                    document.getElementById('property-container').innerHTML = "<p>Nuk u gjet asnjë pronë në tabelë.</p>";
                } else {
                    document.getElementById('property-container').innerHTML = data.map(p => `
                        <div class="card">
                            <h2 style="margin:0; color:var(--gold);">${p.title}</h2>
                            <p style="font-size:1.6rem; margin:5px 0 0 0; color:white;">${p.price.toLocaleString()} €</p>
                        </div>
                    `).join('');
                }
            } catch (e) { 
                console.error(e);
                alert("Lidhja dështoi! Kontrollo nëse Policy në Supabase është ACTIVE."); 
            }
        }

        // Globi 3D dekorativ
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const sphere = new THREE.Mesh(
            new THREE.IcosahedronGeometry(22, 1), 
            new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.15 })
        );
        scene.add(sphere);
        camera.position.z = 55;
        function animate() { requestAnimationFrame(animate); sphere.rotation.y += 0.002; sphere.rotation.x += 0.001; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
