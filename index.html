<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESA-SUPERNOVA</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #050814;
            --gold: #f5c242;
            --dark-card: #111827;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #eef;
            --neon: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- LOCK SCREEN --- */
        #lockScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .lock-box {
            background: var(--dark-card);
            padding: 2.5rem;
            border-radius: 2rem;
            border: 1px solid var(--gold);
            width: 100%;
            max-width: 380px;
            box-shadow: 0 0 40px rgba(245, 194, 66, 0.1);
        }

        img.logo {
            width: 120px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid var(--gold);
        }

        h2 { color: var(--gold); margin-bottom: 1.5rem; letter-spacing: 2px; font-size: 1.2rem; }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            margin-bottom: 15px;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        button.btn-hyr {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--gold);
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button.btn-hyr:hover { background: #eab308; }

        /* --- AI DASHBOARD --- */
        #dashboard {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            max-width: 800px;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass);
        }

        #chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            margin: 20px 0;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid rgba(245, 194, 66, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
